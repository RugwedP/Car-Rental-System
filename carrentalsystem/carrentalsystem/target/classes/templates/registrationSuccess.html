<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.8); 
        }
        .result-container {
            padding: 20px;
            border-radius: 8px;
            width: 50%;
            text-align: center;
            color: #f0f0f0; 
        }
        h2 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #2c2c2c; 
            color: #f0f0f0;
        }
        td {
            padding: 10px;
            border: 1px solid #444; 
            text-align: left;
        }
        @media (max-width: 768px) {
            .result-container {
                width: 80%;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <h2>Employee Registered Successfully</h2>
        <table>
            <tr><td><strong>Employee ID:</strong></td><td th:text="${employee.employeeId}"></td></tr>
            <tr><td><strong>Employee Name:</strong></td><td th:text="${employee.employeeName}"></td></tr>
            <tr><td><strong>Contact Number:</strong></td><td th:text="${employee.contactNo}"></td></tr>
            <tr><td><strong>Date of Birth:</strong></td><td th:text="${employee.dob}"></td></tr>
            <tr><td><strong>Designation:</strong></td><td th:text="${employee.designation}"></td></tr>
            <tr><td><strong>Expiry Date:</strong></td><td th:text="${employee.expiryDate}"></td></tr>
            <tr><td><strong>Email:</strong></td><td th:text="${employee.email}"></td></tr>
        </table>
    </div>
</body>
</html>
